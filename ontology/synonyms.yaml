# synonyms.yaml — словарь синонимов RU/EN доменных терминов «Ариадны» (A-06).
#
# Назначение: канонизация имён сущностей при извлечении (extraction, A-08 — подсказки
# в промпт LLM) и дедупликация узлов графа по синонимам (graph, A-09) — «электроэкстракция»
# и «electrowinning» не должны стать двумя разными узлами Material/Process.
#
# Структура записи:
#   canonical  — каноническое имя термина (RU), это же имя пишется в GraphNode.name
#   type       — один из 8 EntityType (contracts.py 🔒): Material/Process/Equipment/
#                Property/Experiment/Publication/Expert/Facility
#   synonyms   — синонимы/переводы/аббревиатуры (RU и EN вперемешку, без пометки языка —
#                canonical_name() ищет без учёта регистра и языка)
#
# Покрытие: обязательные термины 4 эталонных запросов жюри (docs/dev/TASK.md) +
# базовые материалы/процессы отрасли, реально встречающиеся в корпусе. Качество важнее
# количества — только термины с реальной синонимией/переводом, не полный глоссарий.
#
# Валидация: src/ariadna/graph/ontology.py:load_synonyms() проверяет каждый type
# против contracts.EntityType — неизвестный type = ошибка GRAPH-003 (docs/dev/ERRORS.md).

